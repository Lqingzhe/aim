<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM 聊天系统</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<div class="app">
    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="user-info">
            <div class="user-name" id="user-name">加载中...</div>
            <div class="user-id" id="user-id"></div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="btn-add-friend">➕ 添加好友</button>
            <button class="action-btn" id="btn-create-group">👥 创建群聊</button>
            <button class="action-btn" id="btn-join-group">🚪 加入群聊</button>
            <button class="action-btn" id="btn-friend-apply-list">📋 好友申请</button>
            <button class="action-btn" id="btn-refresh">🔄 刷新</button>
            <button class="action-btn danger" id="btn-logout">🚪 退出</button>
        </div>

        <div class="session-list" id="session-list">
            <div class="empty-tip">加载会话中...</div>
        </div>
    </div>

    <!-- 右侧聊天区 -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-title" id="chat-title">请选择一个会话</div>
        </div>
        <div class="messages-container" id="messages-container">
            <div class="empty-tip">选择一个会话开始聊天</div>
        </div>
        <div class="input-area">
            <textarea id="message-input" rows="1" placeholder="输入消息..."></textarea>
            <button id="send-btn">发送</button>
        </div>
    </div>
</div>

<!-- 弹窗模态框 -->
<div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title">标题</span>
            <span class="modal-close" id="modal-close">&times;</span>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<script src="/static/js/chat.js"></script>
</body>
</html>
