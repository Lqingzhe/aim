<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM 聊天系统</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <audio id="notification-sound" src="/static/notification.mp3" preload="auto">
    </audio>
</head>
<body>
<div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="user-info">
            <div class="user-name" id="user-name">加载中...<span class="status"></span></div>
            <div class="user-id" id="user-id"></div>
            <button id="btn-user-info" class="logout-btn" style="background:#667eea; margin-top:10px;">📝 个人信息</button>
            <button id="btn-logout-device" class="logout-btn" style="background:#ef4444; margin-top:10px;">🚪 退出本设备</button>
            <button id="btn-logout-all" class="logout-btn" style="background:#dc2626; margin-top:5px;">🔚 退出所有设备</button>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="btn-add-friend">➕ 添加好友</button>
            <button class="action-btn" id="btn-friend-apply-list">📋 好友申请</button>
            <button class="action-btn" id="btn-remark">✏️ 设置备注</button>
            <button class="action-btn" id="btn-create-group">👥 创建群聊</button>
            <button class="action-btn" id="btn-join-group">🚪 加入群聊</button>
            <button class="action-btn" id="btn-group-apply-list">📋 群申请</button>
            <button class="action-btn" id="btn-send-group-notice">📢 群通知</button>
            <button class="action-btn" id="btn-transfer-owner">🔄 转让群主</button>
            <button class="action-btn" id="btn-manage-admin">👑 管理员管理</button>
            <button class="action-btn" id="btn-kick-out">🚫 踢出群聊</button>
            <button class="action-btn" id="btn-set-mute">🔇 禁言</button>
            <button class="action-btn" id="btn-release-mute">🔊 解除禁言</button>
            <button class="action-btn" id="btn-refresh">🔄 刷新</button>
        </div>

        <div class="session-list" id="session-list">
            <div class="empty-tip">加载会话中...</div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-area">
        <div class="chat-header">
            <div>
                <div class="chat-title" id="chat-title">请选择一个会话</div>
                <div class="chat-id" id="chat-id"></div>
            </div>
            <div>
                <button id="btn-withdraw-latest" class="chat-action-btn" title="撤回最新消息">↩️ 撤回最新</button>
            </div>
        </div>
        <div class="messages-container" id="messages-container">
            <div class="system-message">选择一个会话开始聊天</div>
        </div>
        <div class="input-area">
            <textarea id="message-input" rows="1" placeholder="输入消息..."></textarea>
            <button id="send-btn">发送</button>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div id="modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modal-title">标题</span>
            <span class="modal-close" id="modal-close">&times;</span>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<!-- ============================================ -->
<!-- JS 文件按顺序引入 -->
<!-- ============================================ -->
<script src="/static/js/config.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/websocket.js"></script>
<script src="/static/js/session.js"></script>
<script src="/static/js/message.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/modals.js"></script>
<script src="/static/js/chat.js"></script>
</body>
</html>
