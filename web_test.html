<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM 系统功能测试平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .status-bar {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-label {
            font-weight: bold;
            color: #333;
        }

        .status-value {
            color: #666;
        }

        .status-online {
            color: #10b981;
            font-weight: bold;
        }

        .status-offline {
            color: #ef4444;
            font-weight: bold;
        }

        .config-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .config-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }

        .config-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .config-field {
            flex: 1;
            min-width: 150px;
        }

        .config-field label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .config-field input, .config-field select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .config-field input:focus, .config-field select:focus {
            outline: none;
            border-color: #667eea;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .test-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .card-body {
            padding: 20px;
        }

        .api-group {
            margin-bottom: 20px;
        }

        .api-group-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e5e7eb;
        }

        .api-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .api-item label {
            width: 120px;
            font-size: 0.85rem;
            color: #666;
        }

        .api-item input, .api-item select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .api-item textarea {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.85rem;
            resize: vertical;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        button.danger {
            background: #ef4444;
        }

        button.danger:hover {
            background: #dc2626;
        }

        button.success {
            background: #10b981;
        }

        button.success:hover {
            background: #059669;
        }

        button.warning {
            background: #f59e0b;
        }

        button.warning:hover {
            background: #d97706;
        }

        .response-area {
            background: #1e1e2e;
            color: #fff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            max-height: 300px;
            overflow: auto;
        }

        .response-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #a0a0a0;
        }

        .log-area {
            background: #1e1e2e;
            color: #4ade80;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow: auto;
        }

        .clear-btn {
            float: right;
            background: #4b5563;
            padding: 4px 8px;
            font-size: 0.7rem;
        }

        .ws-messages {
            background: #1e1e2e;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow: auto;
            font-size: 0.8rem;
        }

        .ws-message {
            color: #10b981;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .ws-message.error {
            color: #ef4444;
        }

        .file-upload {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-upload input[type="file"] {
            padding: 8px;
            border: 1px dashed #ddd;
            border-radius: 6px;
        }

        hr {
            margin: 15px 0;
            border: none;
            border-top: 1px solid #e5e7eb;
        }

        @media (max-width: 768px) {
            .test-grid {
                grid-template-columns: 1fr;
            }
            .api-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .api-item label {
                width: auto;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 IM 系统功能测试平台</h1>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="status-item">
            <span class="status-label">服务状态:</span>
            <span id="api-status" class="status-offline">未连接</span>
        </div>
        <div class="status-item">
            <span class="status-label">WebSocket:</span>
            <span id="ws-status" class="status-offline">未连接</span>
        </div>
        <div class="status-item">
            <span class="status-label">当前用户:</span>
            <span id="current-user" class="status-value">未登录</span>
        </div>
        <div class="status-item">
            <span class="status-label">设备ID:</span>
            <span id="device-id" class="status-value">-</span>
        </div>
    </div>

    <!-- 配置面板 -->
    <div class="config-panel">
        <div class="config-title">⚙️ 服务配置</div>
        <div class="config-row">
            <div class="config-field">
                <label>API Gateway 地址</label>
                <input type="text" id="api-url" value="http://localhost:8080" placeholder="http://localhost:8080">
            </div>
            <div class="config-field">
                <label>WebSocket 地址</label>
                <input type="text" id="ws-url" value="ws://localhost:8080/ws" placeholder="ws://localhost:8080/ws">
            </div>
            <div class="config-field">
                <label>设备ID</label>
                <input type="text" id="device-id-input" value="web-test-001" placeholder="device-id">
            </div>
        </div>
        <button id="update-config" class="success">更新配置</button>
    </div>

    <!-- 认证模块 -->
    <div class="config-panel">
        <div class="config-title">🔐 认证模块</div>
        <div class="api-group">
            <div class="api-item">
                <label>用户ID:</label>
                <input type="number" id="login-user-id" placeholder="用户ID">
                <label>密码:</label>
                <input type="password" id="login-password" placeholder="密码">
                <button id="btn-register">注册</button>
                <button id="btn-login">登录</button>
                <button id="btn-refresh-token">刷新Token</button>
                <button id="btn-logout-all">全设备登出</button>
                <button id="btn-logout-one">当前设备登出</button>
            </div>
        </div>
    </div>

    <div class="test-grid">
        <!-- 用户模块 -->
        <div class="test-card">
            <div class="card-header">👤 用户模块</div>
            <div class="card-body">
                <div class="api-group">
                    <div class="api-group-title">获取用户信息</div>
                    <div class="api-item">
                        <button id="btn-get-user-info">获取我的信息</button>
                        <input type="number" id="other-user-id" placeholder="目标用户ID">
                        <button id="btn-get-other-user-info">获取他人信息</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">更新用户信息</div>
                    <div class="api-item">
                        <input type="text" id="update-username" placeholder="用户名">
                        <input type="text" id="update-intro" placeholder="个性签名">
                        <button id="btn-update-user-info">更新信息</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">用户备注</div>
                    <div class="api-item">
                        <input type="number" id="remark-goal-user" placeholder="目标用户ID">
                        <input type="text" id="remark-nickname" placeholder="备注名">
                        <button id="btn-set-remark">设置/删除备注</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 群组模块 -->
        <div class="test-card">
            <div class="card-header">👥 群组模块</div>
            <div class="card-body">
                <div class="api-group">
                    <div class="api-group-title">群组管理</div>
                    <div class="api-item">
                        <input type="text" id="group-name" placeholder="群名称">
                        <button id="btn-create-group">创建群</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="group-id" placeholder="群ID">
                        <button id="btn-get-group-info">获取群信息</button>
                        <button id="btn-delete-group">解散群</button>
                        <button id="btn-leave-group">退出群</button>
                    </div>
                    <div class="api-item">
                        <input type="text" id="search-group-name" placeholder="搜索群名称">
                        <button id="btn-search-group">搜索群</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">群成员管理</div>
                    <div class="api-item">
                        <input type="number" id="group-id-member" placeholder="群ID">
                        <input type="number" id="goal-user-id" placeholder="目标用户ID">
                        <button id="btn-set-group-apply">申请加入群</button>
                        <button id="btn-agree-group-apply">同意申请</button>
                        <button id="btn-refuse-group-apply">拒绝申请</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="group-id-kick" placeholder="群ID">
                        <input type="number" id="kick-user-id" placeholder="踢出用户ID">
                        <button id="btn-kick-out">踢出群</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="group-id-manager" placeholder="群ID">
                        <input type="number" id="manager-user-id" placeholder="用户ID">
                        <button id="btn-set-manager">设为管理员</button>
                        <button id="btn-revoke-manager">撤销管理员</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="group-id-owner" placeholder="群ID">
                        <input type="number" id="new-owner-id" placeholder="新群主ID">
                        <button id="btn-transfer-owner">转让群主</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">群资料</div>
                    <div class="api-item">
                        <input type="number" id="group-id-remark" placeholder="群ID">
                        <input type="text" id="group-remark-name" placeholder="群备注名">
                        <button id="btn-update-group-remark">更新群备注</button>
                    </div>
                    <div class="api-item">
                        <input type="text" id="change-group-name" placeholder="新群名称">
                        <button id="btn-change-group-info">修改群信息</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 好友/会话模块 -->
        <div class="test-card">
            <div class="card-header">💬 好友/会话模块</div>
            <div class="card-body">
                <div class="api-group">
                    <div class="api-group-title">好友管理</div>
                    <div class="api-item">
                        <input type="number" id="friend-goal-id" placeholder="目标用户ID">
                        <button id="btn-apply-friend">申请好友</button>
                        <button id="btn-get-friend-apply-list">获取好友申请列表</button>
                        <button id="btn-refuse-friend-apply">拒绝好友申请</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="session-id" placeholder="会话ID">
                        <button id="btn-delete-session">删除会话</button>
                        <button id="btn-get-friend-last-visit">获取好友最后访问时间</button>
                    </div>
                    <div class="api-item">
                        <button id="btn-get-group-and-session-id">获取我的群和会话列表</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">禁言管理</div>
                    <div class="api-item">
                        <input type="number" id="mute-group-id" placeholder="群ID">
                        <input type="number" id="mute-user-id" placeholder="禁言用户ID">
                        <input type="number" id="mute-time" placeholder="禁言时长(秒)">
                        <input type="text" id="mute-reason" placeholder="禁言原因">
                        <button id="btn-set-mute">设置禁言</button>
                        <button id="btn-release-mute">解除禁言</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 消息模块 -->
        <div class="test-card">
            <div class="card-header">📨 消息模块</div>
            <div class="card-body">
                <div class="api-group">
                    <div class="api-group-title">发送消息</div>
                    <div class="api-item">
                        <input type="number" id="send-group-id" placeholder="群ID">
                        <textarea id="message-content" rows="2" placeholder="消息内容，支持@用户ID (如 @123) 和@bot"></textarea>
                        <button id="btn-send-message">发送消息</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">文件/语音/图片</div>
                    <div class="api-item file-upload">
                        <input type="file" id="file-input">
                        <input type="number" id="file-group-id" placeholder="群ID">
                        <input type="text" id="file-name" placeholder="文件名">
                        <button id="btn-send-file">发送文件</button>
                    </div>
                    <div class="api-item">
                        <input type="file" id="voice-input" accept="audio/*">
                        <input type="number" id="voice-group-id" placeholder="群ID">
                        <input type="number" id="voice-time" placeholder="语音时长(秒)">
                        <button id="btn-send-voice">发送语音</button>
                    </div>
                    <div class="api-item">
                        <input type="file" id="picture-input" accept="image/*">
                        <input type="number" id="picture-group-id" placeholder="群ID">
                        <button id="btn-send-picture">发送图片</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">消息管理</div>
                    <div class="api-item">
                        <input type="number" id="withdraw-group-id" placeholder="群ID">
                        <input type="number" id="withdraw-message-id" placeholder="消息ID">
                        <button id="btn-withdraw-message">撤回消息</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="get-message-group-id" placeholder="群ID">
                        <input type="number" id="start-time" placeholder="开始时间(时间戳)">
                        <input type="number" id="end-time" placeholder="结束时间(时间戳)">
                        <button id="btn-get-message-list">获取消息列表</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="new-message-group-id" placeholder="群ID">
                        <button id="btn-get-new-message">获取新消息</button>
                    </div>
                    <div class="api-item">
                        <input type="number" id="file-message-id" placeholder="文件消息ID">
                        <button id="btn-get-file-content">获取文件内容</button>
                    </div>
                </div>
                <hr>
                <div class="api-group">
                    <div class="api-group-title">群公告</div>
                    <div class="api-item">
                        <input type="number" id="notice-group-id" placeholder="群ID">
                        <textarea id="notice-content" rows="2" placeholder="公告内容"></textarea>
                        <button id="btn-send-group-notice">发送群公告</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- WebSocket 模块 -->
    <div class="config-panel">
        <div class="config-title">🔌 WebSocket 实时消息</div>
        <div class="api-item">
            <button id="btn-ws-connect" class="success">连接 WebSocket</button>
            <button id="btn-ws-disconnect" class="danger">断开连接</button>
            <button id="btn-ws-ping">发送 Ping</button>
        </div>
        <div class="ws-messages" id="ws-messages">
            <div style="color: #888;">等待消息...</div>
        </div>
    </div>

    <!-- 响应区域 -->
    <div class="config-panel">
        <div class="config-title">📋 API 响应</div>
        <div class="response-area" id="response-area">
            <div class="response-title">等待请求...</div>
            <pre id="response-content" style="margin:0;color:#fff;">暂无响应</pre>
        </div>
    </div>

    <!-- 日志区域 -->
    <div class="config-panel">
        <div class="config-title">
            📝 日志
            <button id="clear-log" class="clear-btn">清空</button>
        </div>
        <div class="log-area" id="log-area">
            <div>[系统] 页面已加载，请输入服务地址后开始测试</div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // 全局变量
    // ============================================
    let API_BASE = localStorage.getItem('api-url') || 'http://localhost:8080';
    let WS_URL = localStorage.getItem('ws-url') || 'ws://localhost:8080/ws';
    let DEVICE_ID = localStorage.getItem('device-id') || 'web-test-001';
    let accessToken = localStorage.getItem('access-token') || null;
    let refreshToken = localStorage.getItem('refresh-token') || null;
    let currentUserId = localStorage.getItem('current-user-id') || null;
    let ws = null;

    // ============================================
    // DOM 元素绑定
    // ============================================
    document.getElementById('api-url').value = API_BASE;
    document.getElementById('ws-url').value = WS_URL;
    document.getElementById('device-id-input').value = DEVICE_ID;

    // ============================================
    // 辅助函数
    // ============================================
    function addLog(message, isError = false) {
        const logArea = document.getElementById('log-area');
        const time = new Date().toLocaleTimeString();
        const logDiv = document.createElement('div');
        logDiv.textContent = `[${time}] ${message}`;
        logDiv.style.color = isError ? '#ef4444' : '#4ade80';
        logDiv.style.marginBottom = '5px';
        logArea.appendChild(logDiv);
        logArea.scrollTop = logArea.scrollHeight;
    }

    function updateStatus() {
        const statusEl = document.getElementById('api-status');
        if (API_BASE) {
            statusEl.textContent = `已配置 (${API_BASE})`;
            statusEl.className = 'status-online';
        } else {
            statusEl.textContent = '未配置';
            statusEl.className = 'status-offline';
        }

        document.getElementById('current-user').textContent = currentUserId || '未登录';
        document.getElementById('device-id').textContent = DEVICE_ID;
    }

    function updateTokenDisplay() {
        if (accessToken) {
            addLog(`Token 已设置 (${accessToken.substring(0, 20)}...)`);
        }
    }

    function getHeaders() {
        const headers = {
            'Content-Type': 'application/json',
            'X-Device-ID': DEVICE_ID
        };
        if (accessToken) {
            headers['Authorization'] = `Bearer ${accessToken}`;
        }
        return headers;
    }

    async function apiCall(method, path, body = null) {
        const url = `${API_BASE}${path}`;
        const options = {
            method: method,
            headers: getHeaders()
        };
        if (body) {
            options.body = JSON.stringify(body);
        }

        addLog(`📤 ${method} ${path}`);
        if (body) addLog(`📦 Body: ${JSON.stringify(body)}`);

        try {
            const response = await fetch(url, options);
            const data = await response.json();

            const responseArea = document.getElementById('response-content');
            responseArea.textContent = JSON.stringify(data, null, 2);

            if (response.ok && data.code === 0) {
                addLog(`✅ ${path} 成功`);
                return data;
            } else {
                addLog(`❌ ${path} 失败: ${data.message || '未知错误'}`, true);
                return data;
            }
        } catch (error) {
            addLog(`❌ ${path} 异常: ${error.message}`, true);
            document.getElementById('response-content').textContent = error.message;
            throw error;
        }
    }

    // ============================================
    // 认证相关
    // ============================================
    async function register() {
        const userId = parseInt(document.getElementById('login-user-id').value);
        const password = document.getElementById('login-password').value;
        if (!userId || !password) {
            addLog('请填写用户ID和密码', true);
            return;
        }
        // 注册只需要密码，userID由服务端生成
        const result = await apiCall('POST', '/user/register', { password: password });
        if (result.code === 0 && result.data?.user_info?.user_id) {

    async function sendFile() {
        const fileInput = document.getElementById('file-input');

        const fileName = document.getElementById('file-name').value;

        if (!fileInput.files.length || !groupId || !fileName) {
            addLog('请选择文件并填写群ID和文件名', true);
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('group_id', groupId);
        formData.append('file_name', fileName);

        const url = `${API_BASE}/message/send-file`;
        const headers = {
            'X-Device-ID': DEVICE_ID
        };
        if (accessToken) {
            headers['Authorization'] = `Bearer ${accessToken}`;
        }

        addLog(`📤 POST /message/send-file`);

        try {
            const response = await fetch(url, { method: 'POST', headers: headers, body: formData });
            const data = await response.json();
            document.getElementById('response-content').textContent = JSON.stringify(data, null, 2);
            if (response.ok && data.code === 0) {
                addLog(`文件发送成功，消息ID: ${data.data?.message_info?.message_id}`);
            } else {
                addLog(`文件发送失败: ${data.message}`, true);
            }
        } catch (error) {
            addLog(`文件发送异常: ${error.message}`, true);
        }
    }

    // ============================================
    // WebSocket
    // ============================================
    function connectWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            addLog('WebSocket 已连接');
            return;
        }

        const wsUrl = `${WS_URL}?token=${encodeURIComponent(accessToken || '')}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            addLog('🔌 WebSocket 已连接');
            document.getElementById('ws-status').textContent = '已连接';
            document.getElementById('ws-status').className = 'status-online';
        };

        ws.onmessage = (event) => {
            const messagesDiv = document.getElementById('ws-messages');
            const time = new Date().toLocaleTimeString();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'ws-message';
            msgDiv.textContent = `[${time}] 收到: ${event.data}`;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            addLog(`📨 WebSocket 消息: ${event.data.substring(0, 100)}`);
        };

        ws.onerror = (error) => {
            addLog(`WebSocket 错误: ${error}`, true);
            const messagesDiv = document.getElementById('ws-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'ws-message error';
            msgDiv.textContent = `[${new Date().toLocaleTimeString()}] WebSocket 错误`;
            messagesDiv.appendChild(msgDiv);
        };

        ws.onclose = () => {
            addLog('WebSocket 已断开');
            document.getElementById('ws-status').textContent = '未连接';
            document.getElementById('ws-status').className = 'status-offline';
        };
    }

    function disconnectWebSocket() {
        if (ws) {
            ws.close();
            ws = null;
        }
    }

    function sendPing() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
            addLog('📤 发送 Ping');
        } else {
            addLog('WebSocket 未连接', true);
        }
    }

        document.getElementById('btn-delete-session').addEventListener('click', deleteSession);
        document.getElementById('btn-get-friend-last-visit').addEventListener('click', getFriendLastVisitTime);
        // 补充创建会话按钮
        const createSessionBtn = document.createElement('button');
        createSessionBtn.textContent = '创建会话';
        createSessionBtn.id = 'btn-create-session';
        createSessionBtn.addEventListener('click', createSession);
        document.querySelector('.test-card:nth-child(3) .api-group:first-child .api-item').appendChild(createSessionBtn);

        // 禁言模块
        document.getElementById('btn-set-mute').addEventListener('click', setMute);
        document.getElementById('btn-release-mute').addEventListener('click', releaseMute);

        // 消息模块
        document.getElementById('btn-send-message').addEventListener('click', sendMessage);
        document.getElementById('btn-send-file').addEventListener('click', sendFile);
        document.getElementById('btn-send-voice').addEventListener('click', sendVoice);
        document.getElementById('btn-send-picture').addEventListener('click', sendPicture);
        document.getElementById('btn-withdraw-message').addEventListener('click', withdrawMessage);
        document.getElementById('btn-get-message-list').addEventListener('click', getMessageList);
        document.getElementById('btn-get-new-message').addEventListener('click', getNewMessage);
        document.getElementById('btn-get-file-content').addEventListener('click', getFileContent);
        document.getElementById('btn-send-group-notice').addEventListener('click', sendGroupNotice);

        // WebSocket
        document.getElementById('btn-ws-connect').addEventListener('click', connectWebSocket);
        document.getElementById('btn-ws-disconnect').addEventListener('click', disconnectWebSocket);
        document.getElementById('btn-ws-ping').addEventListener('click', sendPing);
    }

    // ============================================
    // 页面初始化
    // ============================================
    function init() {
        updateStatus();
        if (accessToken) {
            updateTokenDisplay();
        }
        initEventListeners();
        addLog('测试平台已初始化');
    }

    init();
</script>
</body>
